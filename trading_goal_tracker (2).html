<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trading Goal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0e0e0f;--surface:#18181b;--border:#2a2a2e;
    --text:#f4f4f5;--muted:#71717a;--accent:#22d3ee;
    --green:#4ade80;--red:#f87171;--amber:#fbbf24;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;padding:28px 24px;min-height:100vh}
  .header{display:flex;align-items:baseline;gap:10px;margin-bottom:28px}
  .title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px}
  .subtitle{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
  .tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
  .tab{padding:8px 16px;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:0.05em;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text)}
  .goal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
  .goal-label{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
  .goal-amount{font-family:'Syne',sans-serif;font-size:38px;font-weight:700;line-height:1;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .currency{font-size:20px;color:var(--muted);font-weight:400;align-self:flex-start;margin-top:6px}
  .edit-btn{font-size:11px;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:6px;padding:3px 10px;cursor:pointer;font-family:'DM Mono',monospace;margin-left:auto;opacity:0.7;transition:opacity .2s}
  .edit-btn:hover{opacity:1}
  .input-row{display:flex;align-items:center;gap:10px;margin-top:12px}
  .goal-input{background:#0e0e0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:22px;padding:8px 12px;width:160px;outline:none;transition:border-color .2s}
  .goal-input:focus{border-color:var(--accent)}
  .save-btn{background:var(--accent);color:#0e0e0f;border:none;border-radius:8px;padding:9px 18px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .2s}
  .save-btn:hover{opacity:0.85}
  .progress-wrap{margin-top:18px}
  .progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-size:12px}
  .progress-pct{font-weight:500}
  .progress-track{height:6px;background:var(--border);border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.22,.61,.36,1)}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .stat{background:#0e0e0f;border:1px solid var(--border);border-radius:10px;padding:14px 16px}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px}
  .stat-val{font-size:18px;font-weight:500}
  .pos{color:var(--green)}.neg{color:var(--red)}.neutral{color:var(--muted)}
  .current-section{margin-bottom:16px}
  .curr-label{font-size:11px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
  .curr-row{display:flex;align-items:center;gap:10px}
  .curr-input{background:#0e0e0f;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:18px;padding:8px 12px;width:140px;outline:none;transition:border-color .2s;text-align:left;direction:ltr}
  .curr-input:focus{border-color:var(--green)}
  .divider{height:1px;background:var(--border);margin:18px 0}
</style>
</head>
<body>
<div class="header">
  <span class="title">Trading Goals</span>
  <span class="subtitle">P&amp;L Tracker</span>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('weekly')">Weekly</button>
  <button class="tab" onclick="switchTab('monthly')">Monthly</button>
  <button class="tab" onclick="switchTab('yearly')">Yearly</button>
</div>
<div id="content"></div>
<script>
const state = {
  weekly:  { goal: 1000,  current: 0 },
  monthly: { goal: 4000,  current: 0 },
  yearly:  { goal: 50000, current: 0 }
};
let tab = 'weekly';
let editing = false;

function switchTab(t) {
  tab = t;
  editing = false;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['weekly','monthly','yearly'][i] === t);
  });
  render();
}

function pctColor(p) {
  if (p >= 100) return 'var(--accent)';
  if (p >= 60)  return 'var(--green)';
  if (p >= 30)  return 'var(--amber)';
  return 'var(--red)';
}

function fmt(n) {
  return new Intl.NumberFormat('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 2}).format(n);
}

function render() {
  const d = state[tab];
  const pct = d.goal > 0 ? Math.min(Math.round((d.current / d.goal) * 100), 100) : 0;
  const remaining = d.goal - d.current;
  const clr = pctColor(pct);
  const remClass = remaining <= 0 ? 'pos' : 'neutral';
  document.getElementById('content').innerHTML = `
    <div class="current-section">
      <div class="curr-label">Current P&amp;L (${tab})</div>
      <div class="curr-row">
        <input class="curr-input" type="number" id="currInput" value="${d.current}" step="50" oninput="updateCurrent(this.value)" placeholder="0" />
        <span style="font-size:12px;color:var(--muted)">USD</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="goal-card">
      <div class="goal-label">${tab.charAt(0).toUpperCase()+tab.slice(1)} Goal</div>
      <div class="goal-amount">
        <span class="currency">$</span>
        <span id="goalDisplay">${fmt(d.goal)}</span>
        <button class="edit-btn" onclick="toggleEdit()">${editing ? 'cancel' : 'edit'}</button>
      </div>
      ${editing ? `
        <div class="input-row">
          <input class="goal-input" type="number" id="goalInput" value="${d.goal}" step="100" placeholder="Enter goal" />
          <button class="save-btn" onclick="saveGoal()">save</button>
        </div>
      ` : ''}
      <div class="progress-wrap">
        <div class="progress-meta">
          <span style="font-size:12px;color:var(--muted)">$${fmt(d.current)} of $${fmt(d.goal)}</span>
          <span class="progress-pct" style="color:${clr}">${pct}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:${clr}"></div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-label">Remaining</div>
          <div class="stat-val ${remClass}">${remaining <= 0 ? '✓ Done' : '$' + fmt(remaining)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Status</div>
          <div class="stat-val" style="color:${clr}">${pct >= 100 ? 'Achieved' : pct >= 60 ? 'On Track' : pct >= 30 ? 'Behind' : 'Off Track'}</div>
        </div>
      </div>
    </div>
  `;
  if (editing) {
    const gi = document.getElementById('goalInput');
    if (gi) gi.focus();
  }
}

function toggleEdit() {
  editing = !editing;
  render();
}

function saveGoal() {
  const val = parseFloat(document.getElementById('goalInput').value);
  if (!isNaN(val) && val > 0) {
    state[tab].goal = val;
    editing = false;
    render();
  }
}

function updateCurrent(val) {
  const v = parseFloat(val);
  if (!isNaN(v)) {
    state[tab].current = v;
    updateStats();
  }
}

function updateStats() {
  const d = state[tab];
  const pct = d.goal > 0 ? Math.min(Math.round((d.current / d.goal) * 100), 100) : 0;
  const remaining = d.goal - d.current;
  const clr = pctColor(pct);
  const allStatVals = document.querySelectorAll('.stat-val');
  const progressMeta = document.querySelector('.progress-meta span');
  const progressFill = document.querySelector('.progress-fill');
  const progressPct = document.querySelector('.progress-pct');
  if (progressMeta) progressMeta.textContent = '$'+fmt(d.current)+' of $'+fmt(d.goal);
  if (progressFill) { progressFill.style.width = pct+'%'; progressFill.style.background = clr; }
  if (progressPct) { progressPct.textContent = pct+'%'; progressPct.style.color = clr; }
  if (allStatVals[0]) { allStatVals[0].textContent = remaining <= 0 ? '✓ Done' : '$'+fmt(remaining); allStatVals[0].style.color = remaining <= 0 ? 'var(--green)' : 'var(--muted)'; }
  if (allStatVals[1]) { allStatVals[1].textContent = pct >= 100 ? 'Achieved' : pct >= 60 ? 'On Track' : pct >= 30 ? 'Behind' : 'Off Track'; allStatVals[1].style.color = clr; }
}

render();
</script>
</body>
</html>
