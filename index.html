<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Performance Monitor | Trading Goals</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --yellow: #facc15; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f4f5; --surface: #ffffff; --border: #e4e4e7;
    --text: #09090b; --muted: #71717a; --accent: #0891b2;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 20px; transition: 0.3s; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .title { font-family: var(--syne); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

  /* New High-Impact Header */
  .goal-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 25px 20px; margin-bottom: 20px; text-align: center; }
  .goal-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .goal-val { 
    font-family: Impact, sans-serif; 
    font-size: 64px; 
    line-height: 1; 
    text-transform: uppercase;
    color: var(--text); 
    letter-spacing: -2px;
    margin-bottom: 5px; 
  }
  
  /* Segmented Navigation */
  .segment-nav { display: flex; gap: 8px; margin-bottom: 25px; }
  .seg-btn {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 10px; border-radius: 6px; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s;
  }
  .seg-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(34, 211, 238, 0.05); }

  /* Modern Pulsing Progress Bar */
  .progress-wrap { margin-bottom: 20px; position: relative; }
  .progress-bar-container { height: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; border-radius: 10px; transition: width 0.5s ease-out; animation: pulseGlow 3s infinite; }
  
  .pct-readout { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 5px; }
  
  /* Performance Cards */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
  .card-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .card-val { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  
  /* The Badge System */
  .badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-family: var(--syne); font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
  .badge-off-track { background: rgba(248, 113, 113, 0.1); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.3); }
  .badge-on-track { background: rgba(34, 211, 238, 0.1); color: var(--accent); border: 1px solid rgba(34, 211, 238, 0.3); }
  .badge-met { background: rgba(74, 222, 128, 0.1); color: var(--green); border: 1px solid rgba(74, 222, 128, 0.3); }

  /* Glow Animation */
  @keyframes pulseGlow {
    0% { box-shadow: 0 0 10px rgba(34, 211, 238, 0.1); }
    50% { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
    100% { box-shadow: 0 0 10px rgba(34, 211, 238, 0.1); }
  }
  
  .edit-btn { background: var(--border); border: none; color: var(--muted); padding: 4px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; }
  .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 50%; cursor: pointer; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body data-theme="dark">

  <div class="header">
    <span class="title">Trading Goals</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>
  
  <div class="goal-panel">
    <div class="goal-label">Weekly Objective <button class="edit-btn">EDIT</button></div>
    <div class="goal-val" id="target-amount">$555</div>
  </div>

  <div class="segment-nav">
    <button class="seg-btn active">Weekly</button>
    <button class="seg-btn">Monthly</button>
    <button class="seg-btn">Yearly</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-container">
      <div class="progress-fill" id="goal-progress" style="background: var(--red);"></div>
    </div>
    <div class="pct-readout">
      <span>$125 of $555 P&L</span>
      <span id="pct-val" style="color: var(--red)">23%</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="card-label">Remaining P&L</div>
      <div class="card-val" id="rem-pnl">$430</div>
    </div>
    <div class="stat-card">
      <div class="card-label">Performance Status</div>
      <div class="badge badge-off-track" id="status-badge">Off Track</div>
    </div>
  </div>

<script>
  function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }
  
  // Simulation of the new dynamic styling logic
  function updatePerformance(pnl, goal) {
    const pct = Math.round((pnl / goal) * 100);
    const remaining = goal - pnl;
    
    // Update Text Elements
    document.getElementById('rem-pnl').textContent = '$' + remaining.toLocaleString();
    document.getElementById('pct-val').textContent = pct + '%';
    
    // Dynamic Stying Logic
    const fill = document.getElementById('goal-progress');
    const badge = document.getElementById('status-badge');
    
    if (pct >= 100) {
      fill.style.width = '100%';
      fill.style.background = 'var(--green)';
      fill.style.boxShadow = '0 0 15px rgba(74, 222, 128, 0.4)';
      
      badge.textContent = 'Objective Met';
      badge.className = 'badge badge-met';
    } 
    else if (pct >= 60) {
      fill.style.width = pct + '%';
      fill.style.background = 'var(--accent)';
      fill.style.boxShadow = '0 0 15px rgba(34, 211, 238, 0.3)';
      
      badge.textContent = 'On Pace';
      badge.className = 'badge badge-on-track';
    } 
    else {
      fill.style.width = pct + '%';
      fill.style.background = 'var(--red)';
      fill.style.boxShadow = '0 0 15px rgba(248, 113, 113, 0.3)';
      
      badge.textContent = 'NEEDS CALIBRATION'; // Switched to performance badge language
      badge.className = 'badge badge-off-track';
    }
  }
  
  // Simulation of the initial data load from the image
  window.onload = () => {
    updatePerformance(125, 555);
  };
</script>
</body>
</html>
